<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soterra — Sign In</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--font:'DM Sans',system-ui,sans-serif;--blue:#0E74BD;--navy:#0A2540;--slate:#4A6080;--bg:#F0F7FF;--card:#fff;--border:rgba(0,0,0,.08);--green:#10B981;--red:#EF4444}
body{font-family:var(--font);background:var(--bg);color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(14,116,189,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(14,116,189,.05) 1px,transparent 1px);background-size:44px 44px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(56,189,248,.12) 0%,transparent 60%)}

.auth-shell{position:relative;z-index:1;width:100%;max-width:420px;padding:24px}
.auth-header{text-align:center;margin-bottom:28px}
.auth-logo{font-size:28px;font-weight:700;color:var(--blue);margin-bottom:4px;text-decoration:none;display:inline-block}
.auth-logo span{color:var(--navy)}
.auth-sub{font-size:12px;color:var(--slate)}

.auth-card{background:var(--card);border-radius:16px;border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,.06);padding:28px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Tabs */
.auth-tabs{display:flex;margin-bottom:24px;border-bottom:2px solid rgba(0,0,0,.06)}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.auth-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* Fields */
.field{margin-bottom:14px}
.field-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);margin-bottom:5px}
.field-input{width:100%;height:42px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;padding:0 14px;font-size:14px;font-family:var(--font);color:var(--navy);outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--blue)}
.field-input::placeholder{color:#bbb}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-select{width:100%;height:42px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;padding:0 14px;font-size:14px;font-family:var(--font);color:var(--navy);outline:none;background:var(--card)}

/* Buttons */
.btn-auth{width:100%;height:46px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s;margin-top:8px}
.btn-auth:hover{background:#0A5C97;transform:translateY(-1px)}
.btn-auth:disabled{background:#ccc;cursor:not-allowed;transform:none}

/* Messages */
.auth-msg{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
.auth-msg.error{display:block;background:#FEE2E2;color:#991B1B}
.auth-msg.success{display:block;background:#D1FAE5;color:#065F46}

/* Panel toggle */
.auth-panel{display:none}
.auth-panel.active{display:block}

.auth-footer{text-align:center;margin-top:20px;font-size:12px;color:var(--slate)}
.auth-footer a{color:var(--blue);text-decoration:none;font-weight:500}
</style>
</head>
<body>

<div class="auth-shell">
  <div class="auth-header">
    <a href="homepage-v2.html" class="auth-logo">Soter<span>ra</span></a>
    <div class="auth-sub">Construction Inspection Intelligence</div>
  </div>

  <div class="auth-card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Sign in</div>
      <div class="auth-tab" onclick="switchAuthTab('signup')">Create account</div>
    </div>

    <!-- Messages -->
    <div class="auth-msg" id="auth-msg"></div>

    <!-- LOGIN PANEL -->
    <div class="auth-panel active" id="panel-login">
      <div class="field">
        <div class="field-label">Email</div>
        <input class="field-input" id="login-email" type="email" placeholder="you@company.co.nz">
      </div>
      <div class="field">
        <div class="field-label">Password</div>
        <input class="field-input" id="login-password" type="password" placeholder="Your password">
      </div>
      <button class="btn-auth" onclick="doLogin()">Sign in</button>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="auth-panel" id="panel-signup">
      <div class="field-row">
        <div class="field">
          <div class="field-label">Full name</div>
          <input class="field-input" id="signup-name" placeholder="Adam Domok">
        </div>
        <div class="field">
          <div class="field-label">Role</div>
          <select class="field-select" id="signup-role">
            <option value="pm">Project Manager</option>
            <option value="sm">Site Manager</option>
            <option value="director">Director</option>
            <option value="engineer">Site Engineer</option>
            <option value="foreman">Foreman</option>
          </select>
        </div>
      </div>
      <div class="field">
        <div class="field-label">Company name</div>
        <input class="field-input" id="signup-company" placeholder="Your construction company">
      </div>
      <div class="field">
        <div class="field-label">Email</div>
        <input class="field-input" id="signup-email" type="email" placeholder="you@company.co.nz">
      </div>
      <div class="field">
        <div class="field-label">Password</div>
        <input class="field-input" id="signup-password" type="password" placeholder="Min 6 characters">
      </div>
      <button class="btn-auth" onclick="doSignup()">Create account</button>
    </div>
  </div>

  <div class="auth-footer">
    <a href="homepage-v2.html">&larr; Back to website</a>
  </div>
</div>

<script>
// ═══ SUPABASE CLIENT ═══
var SUPABASE_URL = 'https://pffwyxygovfswchxlxun.supabase.co';
var SUPABASE_KEY = 'sb_publishable_HbvNAWlqxpiFYDZDcORntg_q2uu4Ooy';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
(async function() {
  var { data } = await supabase.auth.getSession();
  if (data.session) {
    // Check if they have a company set up
    var { data: profile } = await supabase
      .from('profiles')
      .select('company_id')
      .eq('id', data.session.user.id)
      .single();

    if (profile && profile.company_id) {
      // Has company — check if they have projects
      var { data: projects } = await supabase
        .from('projects')
        .select('id')
        .limit(1);

      if (projects && projects.length > 0) {
        window.location.href = 'Soterra.html'; // Has projects, go to dashboard
      } else {
        window.location.href = 'setup.html'; // No projects, go to setup
      }
    } else {
      window.location.href = 'setup.html'; // No company, go to setup
    }
  }
})();

// ═══ TAB SWITCHING ═══
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.auth-panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
  event.target.classList.add('active');
  hideMsg();
}

// ═══ MESSAGES ═══
function showMsg(text, type) {
  var el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}
function hideMsg() {
  document.getElementById('auth-msg').className = 'auth-msg';
}

// ═══ LOGIN ═══
async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;

  if (!email || !password) { showMsg('Please fill in all fields', 'error'); return; }

  var { data, error } = await supabase.auth.signInWithPassword({ email: email, password: password });

  if (error) {
    showMsg(error.message, 'error');
    return;
  }

  showMsg('Signed in! Redirecting...', 'success');

  // Check if they have projects
  var { data: projects } = await supabase.from('projects').select('id').limit(1);
  setTimeout(function() {
    if (projects && projects.length > 0) {
      window.location.href = 'Soterra.html';
    } else {
      window.location.href = 'setup.html';
    }
  }, 500);
}

// ═══ SIGNUP ═══
async function doSignup() {
  var name = document.getElementById('signup-name').value.trim();
  var company = document.getElementById('signup-company').value.trim();
  var role = document.getElementById('signup-role').value;
  var email = document.getElementById('signup-email').value.trim();
  var password = document.getElementById('signup-password').value;

  if (!name || !company || !email || !password) { showMsg('Please fill in all fields', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }

  showMsg('Creating your account...', 'success');

  // 1. Sign up the user
  var { data: authData, error: authError } = await supabase.auth.signUp({
    email: email,
    password: password,
    options: { data: { full_name: name } }
  });

  if (authError) {
    showMsg(authError.message, 'error');
    return;
  }

  // Check if email confirmation is required
  if (authData.user && !authData.session) {
    showMsg('Check your email to confirm your account, then sign in.', 'success');
    return;
  }

  if (!authData.session) {
    showMsg('Account created! Please sign in.', 'success');
    switchAuthTab('login');
    return;
  }

  // Wait for the database trigger to create the profile
  await new Promise(function(r) { setTimeout(r, 1500); });

  // 2. Create company
  var companyData = null;
  for (var attempt = 0; attempt < 3; attempt++) {
    var result = await supabase
      .from('companies')
      .insert({ name: company })
      .select()
      .single();

    if (!result.error) {
      companyData = result.data;
      break;
    }
    // Wait and retry
    await new Promise(function(r) { setTimeout(r, 1000); });
  }

  if (!companyData) {
    showMsg('Account created but company setup failed. Please sign in and try again from setup.', 'error');
    return;
  }

  // 3. Update profile with company_id and role (retry up to 3 times)
  var profSuccess = false;
  for (var attempt2 = 0; attempt2 < 3; attempt2++) {
    var profResult = await supabase
      .from('profiles')
      .update({ company_id: companyData.id, full_name: name, role: role })
      .eq('id', authData.user.id);

    if (!profResult.error) {
      profSuccess = true;
      break;
    }
    await new Promise(function(r) { setTimeout(r, 1000); });
  }

  if (!profSuccess) {
    showMsg('Account created but profile link failed. Please sign in — we will fix it on setup.', 'error');
    return;
  }

  showMsg('Account created! Redirecting to project setup...', 'success');
  setTimeout(function() { window.location.href = 'setup.html'; }, 1000);
}

// Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('panel-login').classList.contains('active')) doLogin();
    else doSignup();
  }
});
</script>

</body>
</html>
